# ============================================================
# JavaBank - Configuration File
# ============================================================
# WARNING: Do NOT put real secrets here.
# Set real values as Environment Variables in Railway dashboard.
# ConfigLoader checks env vars first, then falls back to this file.
#
# Env var naming: replace dots with underscores, UPPERCASE
# e.g.  db.password  →  DB_PASSWORD
#       email.password  →  EMAIL_PASSWORD
#       sms.fast2sms.apikey  →  SMS_FAST2SMS_APIKEY
# ============================================================

# ============================================================
# Database Configuration (Supabase)
# ============================================================
db.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:5432/postgres?sslmode=require
db.user=CHANGE_ME
db.password=CHANGE_ME

# ============================================================
# Email Configuration (Gmail SMTP)
# ============================================================
email.smtp.host=smtp.gmail.com
email.smtp.port=465
email.smtp.auth=true
email.smtp.starttls.enable=true
email.username=CHANGE_ME
email.password=CHANGE_ME
email.from=noreply@javabank.com

# ============================================================
# SMS Configuration (Fast2SMS)
# ============================================================
sms.fast2sms.apikey=CHANGE_ME
# Set to false to stop SMS to phone (OTP still shows in console/logs)
# Toggle using enable-sms.bat or disable-sms.bat
sms.enabled=true
