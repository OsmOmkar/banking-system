<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transactions — JavaBank</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebarMount"></div>

  <main class="main-content">
    <div class="page-header">
      <h1>Transactions 💸</h1>
      <p>Deposit, withdraw, and view your transaction history</p>
    </div>

    <div id="alertBox"></div>

    <div style="display:grid;grid-template-columns:340px 1fr;gap:20px;align-items:start">

      <!-- LEFT: Action panel -->
      <div>
        <div class="card" style="margin-bottom:16px">
          <div class="card-title">Select Account</div>
          <select id="accountSelect" class="form-group" style="width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:.9rem"
                  onchange="loadTransactions()">
            <option value="">Loading accounts...</option>
          </select>
          <div id="balanceDisplay" style="margin-top:12px;padding:12px;background:#f0f9ff;border-radius:8px;display:none">
            <div style="font-size:.78rem;color:#6b7280">Current Balance</div>
            <div style="font-size:1.4rem;font-weight:700;color:var(--primary)" id="balVal">-</div>
          </div>
        </div>

        <!-- Tabs: Deposit / Withdraw -->
        <div class="card">
          <div class="tabs" style="margin-bottom:16px">
            <button class="tab active" onclick="setTab('deposit')">💰 Deposit</button>
            <button class="tab"        onclick="setTab('withdraw')">📤 Withdraw</button>
          </div>

          <!-- Deposit pane -->
          <div id="depositPane">
            <div class="form-group">
              <label>Amount (₹)</label>
              <input type="number" id="depositAmt" placeholder="Enter amount" min="1">
            </div>
            <div class="form-group">
              <label>Description</label>
              <input type="text" id="depositDesc" placeholder="e.g. Salary, Cash deposit">
            </div>
            <button class="btn btn-success btn-full" id="depositBtn" onclick="doDeposit()">
              💰 Deposit
            </button>
          </div>

          <!-- Withdraw pane -->
          <div id="withdrawPane" style="display:none">
            <div class="form-group">
              <label>Amount (₹)</label>
              <input type="number" id="withdrawAmt" placeholder="Enter amount" min="1">
            </div>
            <div class="form-group">
              <label>Description</label>
              <input type="text" id="withdrawDesc" placeholder="e.g. ATM withdrawal, Bill payment">
            </div>
            <button class="btn btn-danger btn-full" id="withdrawBtn" onclick="doWithdraw()">
              📤 Withdraw
            </button>
          </div>
        </div>
      </div>

      <!-- RIGHT: Transaction history -->
      <div class="card">
        <div class="card-title" style="justify-content:space-between">
          <span>📋 Transaction History</span>
          <button class="btn btn-outline btn-sm" onclick="loadTransactions()">↻ Refresh</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date & Time</th>
                <th>Type</th>
                <th>Description</th>
                <th>Amount</th>
                <th>Balance After</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="txBody">
              <tr><td colspan="6" style="text-align:center;color:#9ca3af;padding:32px">
                Select an account to view transactions
              </td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/js/config.js"></script>
<script src="/js/nav.js"></script>
<script>
Auth.requireAuth();
renderSidebar("transactions");

let accounts = [];

async function init() {
    accounts = await API.call("/accounts");
    const sel = document.getElementById("accountSelect");
    sel.innerHTML = accounts.map(a =>
        `<option value="${a.id}" data-balance="${a.balance}">
          ${a.accountType} — ${a.accountNumber} (${fmt(a.balance)})
        </option>`).join("");

    // Check for accountId in URL
    const params = new URLSearchParams(window.location.search);
    if (params.get("accountId")) sel.value = params.get("accountId");

    if (accounts.length > 0) {
        updateBalance();
        loadTransactions();
    }
}

function updateBalance() {
    const sel = document.getElementById("accountSelect");
    const opt = sel.options[sel.selectedIndex];
    const bal = opt?.dataset?.balance;
    if (bal !== undefined) {
        document.getElementById("balVal").textContent = fmt(bal);
        document.getElementById("balanceDisplay").style.display = "";
    }
}

async function loadTransactions() {
    const accountId = document.getElementById("accountSelect").value;
    if (!accountId) return;
    updateBalance();

    const tbody = document.getElementById("txBody");
    tbody.innerHTML = `<tr><td colspan="6" style="text-align:center;padding:24px">
      <span class="loader" style="border-color:rgba(0,0,0,.2);border-top-color:var(--primary)"></span>
    </td></tr>`;

    try {
        const txList = await API.call(`/transactions?accountId=${accountId}`);

        if (txList.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6">
              <div class="empty-state"><div class="icon">📋</div><p>No transactions yet</p></div>
            </td></tr>`;
            return;
        }

        tbody.innerHTML = txList.map(tx => {
            const isCredit = tx.type === "DEPOSIT" || tx.type === "INTEREST";
            return `<tr>
              <td style="font-size:.8rem">${fmtDate(tx.date)}</td>
              <td><span class="badge ${txBadge(tx.type)}">${tx.type}</span></td>
              <td>${tx.description || (tx.recipient ? "To: "+tx.recipient : "-")}</td>
              <td class="${isCredit ? 'amount-credit' : 'amount-debit'}">
                ${isCredit ? "+" : "-"}${fmt(tx.amount)}
              </td>
              <td>${fmt(tx.balanceAfter)}</td>
              <td>${tx.flagged
                ? '<span class="badge badge-red">⚠️ Flagged</span>'
                : '<span class="badge badge-green">✓ Clear</span>'}</td>
            </tr>`;
        }).join("");
    } catch(e) {
        tbody.innerHTML = `<tr><td colspan="6" style="color:red;text-align:center">${e.message}</td></tr>`;
    }
}

function setTab(tab) {
    document.querySelectorAll(".tab").forEach((t, i) =>
        t.classList.toggle("active", (i===0)===(tab==="deposit")));
    document.getElementById("depositPane").style.display  = tab === "deposit"  ? "" : "none";
    document.getElementById("withdrawPane").style.display = tab === "withdraw" ? "" : "none";
}

async function doDeposit() {
    const accountId = document.getElementById("accountSelect").value;
    const amount = parseFloat(document.getElementById("depositAmt").value);
    const description = document.getElementById("depositDesc").value || "Deposit";
    if (!accountId) { showAlert("Select an account first", "warning"); return; }
    if (!amount || amount <= 0) { showAlert("Enter a valid amount", "error"); return; }

    const btn = document.getElementById("depositBtn");
    btn.disabled = true; btn.innerHTML = '<span class="loader"></span> Processing...';

    try {
        const tx = await API.call("/deposit", "POST", { accountId: parseInt(accountId), amount, description });
        showAlert(`✅ Deposited ${fmt(amount)} successfully! New balance: ${fmt(tx.balanceAfter)}`, "success");
        document.getElementById("depositAmt").value = "";
        document.getElementById("depositDesc").value = "";
        await init(); // refresh balance
        await loadTransactions();
    } catch(e) {
        showAlert(e.message, "error");
    } finally {
        btn.disabled = false; btn.innerHTML = "💰 Deposit";
    }
}

async function doWithdraw() {
    const accountId = document.getElementById("accountSelect").value;
    const amount = parseFloat(document.getElementById("withdrawAmt").value);
    const description = document.getElementById("withdrawDesc").value || "Withdrawal";
    if (!accountId) { showAlert("Select an account first", "warning"); return; }
    if (!amount || amount <= 0) { showAlert("Enter a valid amount", "error"); return; }

    const btn = document.getElementById("withdrawBtn");
    btn.disabled = true; btn.innerHTML = '<span class="loader"></span> Processing...';

    try {
        const tx = await API.call("/withdraw", "POST", { accountId: parseInt(accountId), amount, description });
        showAlert(`✅ Withdrew ${fmt(amount)}. New balance: ${fmt(tx.balanceAfter)}`, "success");
        document.getElementById("withdrawAmt").value = "";
        document.getElementById("withdrawDesc").value = "";
        await init();
        await loadTransactions();
    } catch(e) {
        showAlert(e.message, "error");
    } finally {
        btn.disabled = false; btn.innerHTML = "📤 Withdraw";
    }
}

function showAlert(msg, type = "success") {
    document.getElementById("alertBox").innerHTML =
        `<div class="alert alert-${type}">${msg}</div>`;
    setTimeout(() => document.getElementById("alertBox").innerHTML = "", 5000);
}

function txBadge(type) {
    return { DEPOSIT:"badge-green", WITHDRAWAL:"badge-red",
             TRANSFER:"badge-blue", INTEREST:"badge-yellow" }[type] || "badge-gray";
}

init();
</script>
</body>
</html>
