<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transactions — JavaBank</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="app-layout">
  <div id="sidebarMount"></div>
  <main class="main-content">
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <h1>Transactions 📋</h1>
        <p>View your complete transaction history</p>
      </div>
      <a href="payments.html" class="btn btn-primary">💸 Make Payment</a>
    </div>

    <div id="alertBox"></div>

    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">
        <div>
          <label style="font-weight:500;font-size:.9rem;margin-right:8px">Account:</label>
          <select id="accountSelect" style="padding:8px 14px;border:1px solid var(--border);border-radius:8px;font-size:.9rem" onchange="loadTransactions()">
            <option value="">Loading accounts...</option>
          </select>
        </div>
        <div id="balanceDisplay" style="display:none;padding:10px 16px;background:#f0f9ff;border-radius:8px">
          <span style="font-size:.78rem;color:#6b7280">Balance: </span>
          <span style="font-size:1.1rem;font-weight:700;color:var(--primary)" id="balVal">-</span>
        </div>
        <button class="btn btn-outline btn-sm" onclick="loadTransactions()">↻ Refresh</button>
      </div>
    </div>

    <div class="card">
      <div class="card-title">📋 Transaction History</div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Txn ID</th>
              <th>Date & Time</th>
              <th>Type</th>
              <th>Description</th>
              <th>Amount</th>
              <th>Balance After</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="txBody">
            <tr><td colspan="7" style="text-align:center;color:#9ca3af;padding:32px">
              Select an account to view transactions
            </td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="../js/config.js"></script>
<script src="../js/nav.js"></script>
<script>
Auth.requireAuth();
renderSidebar("transactions");

let accounts = [];

async function init() {
    accounts = await API.call("/accounts");
    const sel = document.getElementById("accountSelect");
    sel.innerHTML = accounts.map(a =>
        `<option value="${a.id}" data-balance="${a.balance}">
          ${a.accountType} — ${a.accountNumber} (${fmt(a.balance)})
        </option>`).join("");
    const params = new URLSearchParams(window.location.search);
    if (params.get("accountId")) sel.value = params.get("accountId");
    if (accounts.length > 0) { updateBalance(); loadTransactions(); }
}

function updateBalance() {
    const sel = document.getElementById("accountSelect");
    const opt = sel.options[sel.selectedIndex];
    if (opt?.dataset?.balance !== undefined) {
        document.getElementById("balVal").textContent = fmt(opt.dataset.balance);
        document.getElementById("balanceDisplay").style.display = "";
    }
}

async function loadTransactions() {
    const accountId = document.getElementById("accountSelect").value;
    if (!accountId) return;
    updateBalance();
    const tbody = document.getElementById("txBody");
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:24px"><span class="loader" style="border-color:rgba(0,0,0,.2);border-top-color:var(--primary)"></span></td></tr>`;
    try {
        const txList = await API.call(`/transactions?accountId=${accountId}`);
        if (txList.length === 0) {
            tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="icon">📋</div><p>No transactions yet</p></div></td></tr>`;
            return;
        }
        tbody.innerHTML = txList.map(tx => {
            const isCredit = tx.type === "DEPOSIT" || tx.type === "INTEREST";
            return `<tr>
              <td><code style="font-size:.75rem;background:#f3f4f6;padding:2px 6px;border-radius:4px">#${tx.id}</code></td>
              <td style="font-size:.8rem">${fmtDate(tx.date)}</td>
              <td><span class="badge ${txBadge(tx.type)}">${tx.type}</span></td>
              <td style="max-width:200px;font-size:.85rem">${tx.description || (tx.recipient ? "To: "+tx.recipient : "-")}</td>
              <td class="${isCredit ? 'amount-credit' : 'amount-debit'}">${isCredit ? "+" : "-"}${fmt(tx.amount)}</td>
              <td>${fmt(tx.balanceAfter)}</td>
              <td>${tx.flagged
                ? '<span class="badge badge-red">⚠️ Flagged</span>'
                : '<span class="badge badge-green">✓ Clear</span>'}</td>
            </tr>`;
        }).join("");
    } catch(e) {
        tbody.innerHTML = `<tr><td colspan="7" style="color:red;text-align:center">${e.message}</td></tr>`;
    }
}

function txBadge(type) {
    return { DEPOSIT:"badge-green", WITHDRAWAL:"badge-red", TRANSFER:"badge-blue", INTEREST:"badge-yellow" }[type] || "badge-gray";
}

init();
</script>
</body>
</html>
